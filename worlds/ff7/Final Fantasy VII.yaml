# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: Player{number}           

# Used to describe your yaml. Useful if you have multiple files.
description: Default Final Fantasy VII Template  

game: Final Fantasy VII
requires:
  version: 0.6.7                # minimum Archipelago version

Final Fantasy VII:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    #
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 0 # equivalent to 0
    normal: 50 # equivalent to 50
    extreme: 0 # equivalent to 99

  accessibility:
    # Set rules for reachability of your items/locations.
    #
    # **Full:** ensure everything can be reached and acquired.
    #
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 50
    minimal: 0

  ######################
  # Randomizer Options #
  ######################
  randomize_field_items:
    # Randomize items found in the field (treasure chests, pickups, materia).
    'false': 0
    'true': 50

  field_items_mode:
    # Controls how field items are randomized.
    # - shuffle: Items are shuffled among the original locations (same pool, different spots).
    # - replace: Items are replaced with a completely random selection.
    shuffle: 50
    replace: 0

  field_items_keep_type:
    # When using Replace mode, keep the same item type (weapon stays weapon, etc.).
    'false': 50
    'true': 0

  randomize_shops:
    # Randomize shop inventories. Reserves native-grid shop slots as AP checks (needs shophook.dll).
    'false': 50
    'true': 0

  randomize_starting_equipment:
    # Randomize starting equipment for each character (base Gold Saucer feature).
    'false': 0
    'true': 50

  starting_equipment_tier:
    # Tier of starting equipment when randomization is enabled (1-5, higher = better).
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 5
    3: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-5: 0 # random value between 1 and 5

  #################
  # World Options #
  #################
  free_roam:
    # Start the game on the world map at game moment 1603 (near-endgame state).
    # Vehicles (Tiny Bronco, Highwind, Submarine) and Midgar re-entry (via Key to Sector 5)
    # are locked until received as Archipelago items. Requires a compatible Gold Saucer
    # .apff7 seed file with free_roam enabled.
    'false': 0
    'true': 50

  disable_gold_saucer:
    # Remove every Gold Saucer check from the pool (Free Roam only).
    # The Gold Ticket item still controls access to the area for any logic that needs it.
    'false': 50
    'true': 0

  weapon_fight_checks:
    # Include the optional Weapon superbosses as check locations (Free Roam).
    # When on, defeating Ultimate, Ruby, and Emerald Weapon each award a check.
    'false': 0
    'true': 50

  ####################
  # Gameplay Options #
  ####################
  exp_multiplier:
    # Multiply all battle EXP gained. 1 = normal.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 50
    1: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-50: 0 # random value between 1 and 50

  gil_multiplier:
    # Multiply all battle Gil gained. 1 = normal.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 50
    1: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-50: 0 # random value between 1 and 50

  ap_multiplier:
    # Multiply all battle AP (materia ability points) gained. 1 = normal.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 50
    1: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-50: 0 # random value between 1 and 50

  start_with_chocobo_lure:
    # Start with a Chocobo Lure materia in your inventory.
    'false': 50
    'true': 0

  ################
  # Goal Options #
  ################
  victory_condition:
    # Goal required to complete the seed.
    defeat_sephiroth: 50

  death_link:
    # When you die, everyone who enabled death link dies. Of course, the reverse is true too.
    'false': 50
    'true': 0

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with these items.
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    []

  exclude_locations:
    # Prevent these locations from having an important item.
    []

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []
